services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dekitasuku_laravel_app
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    networks:
      - dekitasuku_laravel_network

  web:
    image: nginx:alpine
    container_name: dekitasuku_laravel_web
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - dekitasuku_laravel_network

  db:
    image: mysql:8.0
    container_name: dekitasuku_laravel_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dekitasuku_laravel
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - dekitasuku_laravel_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: dekitasuku_laravel_pma
    environment:
      PMA_HOST: db
      PMA_USER: laravel_user
      PMA_PASSWORD: laravel_pass
    ports:
      - "8082:80"
    depends_on:
      - db
    networks:
      - dekitasuku_laravel_network

networks:
  dekitasuku_laravel_network:
    driver: bridge

volumes:
  db_data: